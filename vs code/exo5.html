<!DOCTYPE html>
<html>
  <body>
    <meta charset="utf-8">
    <h1>Exercice N°5</h1>
    <p>Structures de contrôle</p>
    <p>Cliquez sur le bouton pour afficher le jour de la semaine.</p>
    <button onclick="myFunction()">Jour ?</button>
    <p id="demo"></p>

    <script>
    function myFunction()
    {
        var jour;
        var d = new Date().getDay();
        switch (d)
        {
            case 0: jour="Dimanche"; break;
            case 1: jour="Lundi"; break;
            case 2: jour="Mardi"; break;
            case 3: jour="Mercredi"; break;
            case 4: jour="Jeudi"; break;
            case 5: jour="Vendredi"; break;
            case 6: jour="Samedi"; break;
        }
        document.getElementById("demo").innerHTML = jour;
    }
    </script>
  </body>
</html>
