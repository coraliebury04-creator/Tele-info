<!DOCTYPE html>
<html>
  <body onLoad="checkCookies()">
    <meta charset="utf-8">
    <h1>Exercice N°7</h1>
    <p>Paramètres du navigateur</p>
    <script>
        function checkCookies()
        {
            if (navigator.cookieEnabled==true)
            {
                alert("Les cookies sont autorisés");
            }
            else
            {
                alert("Les cookies ne sont pas autorisés");
            }
        }
    </script>
  </body>
</html>
