<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Jeu du Nombre Secret</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background-color: #f4f4f9; }
        .container { background: rgb(255, 255, 255); padding: 20px; border-radius: 10px; display: inline-block; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input { padding: 10px; width: 50px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #218838; }
        #message { margin-top: 20px; font-weight: bold; color: #333; }
    </style>
</head>
<body>

<div class="container">
    <h1>Le Nombre Secret 🕵️</h1>
    <p>Devinez le nombre entre 1 et 100 :</p>
    
    <input type="number" id="choix" min="1" max="100">
    <button onclick="verifier()">Deviner</button>

    <div id="message"></div>
</div>

<script>
    let nombreSecret = Math.floor(Math.random() * 100) + 1;
    let tentatives = 0;

    function verifier() {
        let choixUtilisateur = parseInt(document.getElementById("choix").value);
        let messageDiv = document.getElementById("message");
        tentatives++;

        if (isNaN(choixUtilisateur)) {
            messageDiv.innerHTML = "Veuillez entrer un nombre !";
        } else if (choixUtilisateur < nombreSecret) {
            messageDiv.innerHTML = "C'est plus grand ! 📈";
            messageDiv.style.color = "blue";
        } else if (choixUtilisateur > nombreSecret) {
            messageDiv.innerHTML = "C'est plus petit ! 📉";
            messageDiv.style.color = "orange";
        } else {
            messageDiv.innerHTML = `🎉 Gagné ! Le nombre était ${nombreSecret}. <br> Réussi en ${tentatives} tentatives !`;
            messageDiv.style.color = "green";
        }
        
        // On vide le champ pour le prochain essai
        document.getElementById("choix").value = "";
    }
</script>

</body>
</html>
