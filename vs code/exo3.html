<!DOCTYPE html>
<html>
  <body>
    <meta charset="utf-8">
    <h1>Exercice N°3</h1>
    <p id="demo">
        JavaScript peut changer le style d'un élément HTML.
    </p>

    <script>
    function myFunction()
    {
        x=document.getElementById("demo"); // Trouver l'élément
        if (x.style.color == "green")
        {
            x.style.color="red";
        }
        else
        {
            x.style.color="green";
        }
    }
    </script>

    <button type="button" onClick="myFunction()">Cliquez moi !</button>
  </body>
</html>
