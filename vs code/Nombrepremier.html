
<meta charset="utf-8">
<script>
N = prompt("Limite supérieure :");

var N, i, diviseur;
for (i=2; i<=N; i++) {
    diviseur = 2;
    while((i%diviseur != 0) && (diviseur < i)) {
        diviseur = diviseur + 1;
    }
    if(diviseur == i) {
        alert(i + " est un nombre premier");
    }
}
</script>
