<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<form class="student">
    <label for="nom" class="form-label">Nom</label>
    <input type="text" id="nom" class="form-control">
    <br>
    
    <label for="prenom" class="form-label">Prénom</label>
    <input type="text" id="prenom" class="form-control">
    <br>
    
    <label for="email" class="form-label">Email</label>
    <input type="email" id="email" class="form-control">
    <br>

    <button type="button" onclick="createEtudiant()" class="btn btn-primary">
        Ajouter l'étudiant
    </button>
    <button type="button" onclick="goBack()" class="btn btn-secondary">Retour</button>
<script>
    var id = new URLSearchParams(window.location.search).get("id");
    if (id) {
        var req = new XMLHttpRequest();
        var url_api = 'http://192.168.1.224/ciel2027/api/etudiants.php?id=' + id;
        req.open("GET", url_api, true);
        req.setRequestHeader('Content-Type', 'application/json');
        req.send();
        req.onload = function () {
            var json = JSON.parse(req.responseText);
            document.getElementById("nom").value = json["nom"];
            document.getElementById("prenom").value = json["prenom"];
            document.getElementById("email").value = json["email"];
        };
    }

    function createEtudiant() {
        var json = {};
        // On récupère les valeurs saisies dans le formulaire
        json["nom"] = document.getElementById("nom").value;
        json["prenom"] = document.getElementById("prenom").value;
        json["email"] = document.getElementById("email").value;

        var req = new XMLHttpRequest();
        // Note : On retire le "?id=" car c'est une création
        var url_api = 'http://192.168.1.224/ciel2027/api/etudiants.php';
        
        req.open("POST", url_api, true); // Utilisation de POST pour l'ajout
        req.setRequestHeader('Content-Type', 'application/json');
        
        req.send(JSON.stringify(json));

        req.onload = function () {
            if (req.status === 201 || req.status === 200) {
                alert("Étudiant ajouté avec succès !");
                window.open('index.html', '_self');
            } else {
                console.error("Erreur lors de l'ajout");
            }
        };
    }

    function goBack() {            
        window.history.back();
    }
</script>
</body>
</html>
