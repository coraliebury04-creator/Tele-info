<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h2>Modification d'un étudiant</h2>
        <form>
            <div class="mb-3">
                <label>Nom</label>
                <input type="text" id="nom" class="form-control">
            </div>
            <div class="mb-3">
                <label>Prénom</label>
                <input type="text" id="prenom" class="form-control">
            </div>
            <div class="mb-3">
                <label>Email</label>
                <input type="email" id="email" class="form-control">
            </div>
            <button type="button" class="btn btn-primary" onclick="window.location.href = 'index.html';">
                Retour
            </button> 
        <button type="button" class="btn btn-success" onclick="updateEtudiant();">
            Enregistrer
        </button>
        <button type="button" class="btn btn-danger" onclick="deleteEtudiant();">
                Supprimer l'étudiant
            </button>
        </form>
    </div>
    <script>
        var url_string = window.location;
        var url = new URL(url_string);
        var id = url.searchParams.get("id");
        if (id !== null) {
            var req = new XMLHttpRequest();
            var url_api = 'http://192.168.1.224/ciel2027/api/etudiants.php?id=' + id;
            req.open("GET", url_api, true);
            req.setRequestHeader('Content-Type', 'application/json');
            req.send();
            req.onload = function () {
                var json = JSON.parse(req.responseText);
                console.log(json);
                document.getElementById("nom").value = json["nom"];
                document.getElementById("prenom").value = json["prenom"];
                document.getElementById("email").value = json["email"];
            };
        }
function updateEtudiant() {
    var json = {};
    json["nom"] = document.getElementById("nom").value;
    json["prenom"] = document.getElementById("prenom").value;
    json["email"] = document.getElementById("email").value;

    var req = new XMLHttpRequest();
    var url_api = 'http://192.168.1.224/ciel2027/api/etudiants.php?id=' + id;
    req.open("PUT", url_api, true);
    req.setRequestHeader('Content-Type', 'application/json');
    req.send(JSON.stringify(json));
    req.onload = function () {
        var json = JSON.parse(req.responseText);
        console.log(json);
        window.open('./index.html', '_self');
       

    };
}
function deleteEtudiant() {
    //affiche une boite de dialogue de confirmation
    var confirmation = confirm("Êtes-vous sûr de vouloir supprimer cet étudiant ?");
    //verifie si l'utilisateur a appuyé sur le bouton "OK"
    if (confirmation) {
        //si l'utilisateur a comfirmé, effectue l'action
        var req = new XMLHttpRequest();
        var url_api = 'http://192.168.1.224/ciel2027/api/etudiants.php?id=' + id;
        req.open("DELETE", url_api, true);
        req.setRequestHeader('Content-Type', 'application/json');
        req.send();
        req.onload = function () {
            var json = JSON.parse(req.responseText);
            console.log(json);
            window.open('./index.html', '_self');
            

        };
    }
}
    </script>
</body>
</html>
