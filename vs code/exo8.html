<!DOCTYPE html>
<html>
  <body>
    <meta charset="utf-8">
    <h1>Exercice N°8</h1>
    <p>Passage d'objets en paramètres</p>
    <div onmouseover="mOver(this)" onmouseout="mOut(this)"
      style="background-color:hsl(7, 68%, 54%);width:120px;height:20px;padding:40px;">
      Passez le curseur ici
    </div>
    <script>
        function mOver(obj)
        {
            obj.innerHTML="Merci";
            obj.style.backgroundColor="rgb(0, 0, 255)";
        }
        function mOut(obj)
        {
            obj.innerHTML="Passez le curseur ici";
            obj.style.backgroundColor="rgb(255, 0, 0)";
        }
    </script>
  </body>
</html>
