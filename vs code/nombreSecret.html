<meta charset="utf-8">
<script>
let nombreSecret = Math.floor(Math.random() * 100) + 1;
let choixUtilisateur;
let tentatives = 0;

while (choixUtilisateur !== nombreSecret) {
    choixUtilisateur = parseInt(prompt("Devinez le nombre (1-100) :"));
    tentatives++;

    if (choixUtilisateur < nombreSecret) {
        alert("Trop petit");
    } else if (choixUtilisateur > nombreSecret) {
        alert("Trop grand");
    }
}

alert("Gagné ! " + tentatives + " tentatives.");

</script>
