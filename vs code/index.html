<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ma Page Personnelle - Whitney</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-card">
        <h1>Mon Espace Personnel</h1>
        <h2 class="subtitle">BURY Whitney</h2>

        <p class="intro">Bienvenue sur mon site personnel. Ma passion est le chant, les séries asiatiques, la peinture et la cuisine. </p>

     <div class="media-container">
    <img src="ma-photo.webp" alt="Photo de Whitney">
    
    <video controls>
        <source src="ma-video.mp4" type="video/mp4">
        Votre navigateur ne supporte pas la vidéo.
    </video>
</div>  

        <div class="info-grid">
            <div class="info-item">
                <span class="label">Date & Heure</span>
                <div id="clock">Chargement...</div>
            </div>
            <div class="info-item">
                <span class="label">Météo</span>
                <div id="weather">Chargement...</div>
            </div>
            <div class="info-item">
                <span class="label">Bitcoin (BTC)</span>
                <div id="prix" style="font-weight: bold; color: #f7931a;">0.00 €</div>
            </div>
        </div>

        <div class="info-item" style="margin-top: 10px;">
            <span class="label">Conversion</span>
            <div id="currency">1 EUR = -- USD</div>
        </div>

        <hr style="border: 1px solid #eee; margin: 20px 0;">

        <div class="game-box">
            <h3 style="color: #9370DB;">Jeu de la Dichotomie</h3>
            <p>Trouve le nombre magique : <span id="val" style="color: #FF007F; font-weight: bold;">50</span></p>
            <input type="range" id="slider" min="0" max="100" value="50" oninput="updateVal(this.value)">
            <br>
            <button onclick="check()">Deviner</button>
            <p id="result"></p>
        </div>
    </div>

    <script>
        // 1. HORLOGE
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR');
        }, 1000);

        // 2. MÉTÉO (OpenWeatherMap)
const apiKey = "TON_API_KEY"; 
const ville = "Fort-de-France";

fetch(`https://api.openweathermap.org/data/2.5/weather?q=${ville}&appid=${apiKey}&units=metric&lang=fr`)
    .then(r => r.json())
    .then(data => {
        const temp = Math.round(data.main.temp);
        const desc = data.weather[0].description;
        const icon = data.weather[0].icon;
        // Affiche l'icône et la température
        document.getElementById('weather').innerHTML = `
            <img src="https://openweathermap.org/img/wn/${icon}.png" style="width:30px; vertical-align:middle;">
            ${temp}°C, ${desc}
        `;
    })
    .catch(() => {
        document.getElementById('weather').innerText = "Erreur météo";
    });

        // 3. BITCOIN (Toutes les 10s)
        async function updateBTC() {
            try {
                const res = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCEUR');
                const data = await res.json();
                document.getElementById('prix').innerText = parseFloat(data.price).toFixed(2) + " €";
            } catch (e) { console.log("Erreur BTC"); }
        }
        updateBTC();
        setInterval(updateBTC, 10000);

        // 4. CONVERSION
        fetch('https://open.er-api.com/v6/latest/EUR')
            .then(r => r.json())
            .then(data => {
                document.getElementById('currency').innerText = `1 EUR = ${data.rates.USD.toFixed(2)} USD`;
            });

        // 5. JEU
        let secret = Math.floor(Math.random() * 101);
        function updateVal(v) { document.getElementById('val').innerText = v; }
        function check() {
            let guess = document.getElementById('slider').value;
            let res = document.getElementById('result');
            if(guess == secret) { 
                res.innerText = "Gagné ! Bravo !"; 
                res.style.color = "#40E0D0"; 
            } else { 
                res.innerText = guess < secret ? "Plus haut !" : "Plus bas !"; 
                res.style.color = "#FF007F"; 
            }
        }
    </script>
</body>
</html>
