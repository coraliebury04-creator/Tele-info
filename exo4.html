<!DOCTYPE html>
<html>
  <body>
    <meta charset="utf-8">
    <h1>Exercice N°4</h1>
    <p>
        JavaScript et la syntaxe objet - Utilisation de l'objet document.
    </p>
    <script>
        var personne=new Object();
        personne.prenom="Joe";
        personne.nom="Dalton";
        personne.age=50;
        var message1 = (personne.prenom + " " + personne.nom + " a " + personne.age + " ans<br />");
        document.write(message1);
        var message2 = message1.toUpperCase();
        document.write(message2);
    </script>
  </body>
</html>
